name: Deploy To Azure Container Apps

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
  IMAGE: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required variables
        run: |
          test -n "${{ vars.AZURE_RESOURCE_GROUP }}" || (echo "Missing AZURE_RESOURCE_GROUP" && exit 1)
          test -n "${{ vars.AZURE_CONTAINER_APP_NAME }}" || (echo "Missing AZURE_CONTAINER_APP_NAME" && exit 1)
          test -n "${{ vars.ACR_LOGIN_SERVER }}" || (echo "Missing ACR_LOGIN_SERVER" && exit 1)
          test -n "${{ vars.IMAGE_NAME }}" || (echo "Missing IMAGE_NAME" && exit 1)

      - name: Print deployment target
        run: |
          echo "Resource group: ${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "Container app: ${{ vars.AZURE_CONTAINER_APP_NAME }}"
          echo "Image: ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:latest"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure Container App image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE"
